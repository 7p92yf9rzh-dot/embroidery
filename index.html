<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>embroidery</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🧵</text></svg>">
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;600&family=Noto+Sans+JP:wght@300;400;500&display=swap');
:root{
  --linen:#F5EFE6; --warm:#FDFAF6; --brown:#5C3D2E;
  --rose:#C4866A; --ink:#2C1F14; --muted:#9B8B7E; --border:#E2D5C8;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--linen);color:var(--ink);font-family:'Noto Sans JP',sans-serif;font-weight:300;min-height:100vh;}
header{background:var(--brown);padding:1.4rem 1rem 1.1rem;text-align:center;}
header h1{font-family:'Noto Serif JP',serif;font-size:1.35rem;color:var(--linen);letter-spacing:.1em;font-weight:600;}
header p{color:var(--rose);font-size:.72rem;letter-spacing:.06em;margin-top:.3rem;}

/* 2カラムレイアウト */
main{
  display:grid;
  grid-template-columns:1fr;
  gap:1.2rem;
  max-width:1200px;
  margin:0 auto;
  padding:1.4rem 1rem 3rem;
}
@media(min-width:768px){
  main{
    grid-template-columns:1fr 1fr;
    align-items:start;
    padding:1.8rem 1.5rem 3rem;
  }
}
.left-col{ display:flex; flex-direction:column; gap:1rem; }
.right-col{ display:flex; flex-direction:column; gap:1rem; }

/* upload */
.upload-zone{border:2px dashed var(--border);border-radius:4px;background:var(--warm);padding:2rem 1rem;text-align:center;cursor:pointer;transition:.2s;position:relative;}
.upload-zone:hover,.upload-zone.drag-over{border-color:var(--rose);background:#FDF6F0;}
.upload-zone input{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%;}
.upload-icon{font-size:2rem;margin-bottom:.5rem;display:block;}
.upload-zone h2{font-size:.9rem;font-weight:500;color:var(--brown);font-family:'Noto Serif JP',serif;margin-bottom:.25rem;}
.upload-zone p{font-size:.7rem;color:var(--muted);}

/* preview */
#preview-section{display:none;margin-top:1.3rem;}
.toolbar{display:flex;align-items:center;gap:.4rem;margin-bottom:.5rem;flex-wrap:wrap;}
.tb-btn{border:1px solid var(--border);background:var(--warm);border-radius:3px;padding:.32rem .7rem;font-size:.7rem;font-family:'Noto Sans JP',sans-serif;cursor:pointer;color:var(--muted);transition:.15s;white-space:nowrap;}
.tb-btn:hover{border-color:var(--rose);color:var(--rose);}
.tb-btn.active{background:var(--brown);border-color:var(--brown);color:var(--linen);}
.tb-sep{flex:1;}
.zoom-label{font-size:.68rem;color:var(--muted);min-width:3rem;text-align:right;}
.zb{border:1px solid var(--border);background:var(--warm);border-radius:3px;width:26px;height:26px;font-size:.95rem;cursor:pointer;color:var(--brown);display:flex;align-items:center;justify-content:center;padding:0;}
.zb:hover{border-color:var(--rose);}
.viewport{width:100%;height:360px;border:1px solid var(--border);border-radius:4px;background:#1a1210;overflow:hidden;position:relative;user-select:none;-webkit-user-select:none;touch-action:none;}
#view-canvas{position:absolute;top:0;left:0;}
#sel-overlay{position:absolute;top:0;left:0;pointer-events:none;}
.hint-bar{font-size:.66rem;color:var(--muted);margin-top:.35rem;text-align:center;min-height:1em;}
.hint-bar b{color:var(--rose);font-weight:500;}
.btn-clear-sel{display:none;background:none;border:1px solid var(--border);border-radius:3px;padding:.26rem .75rem;font-size:.68rem;color:var(--muted);cursor:pointer;margin-top:.3rem;font-family:'Noto Sans JP',sans-serif;}
.btn-clear-sel:hover{border-color:var(--rose);color:var(--rose);}


/* controls */
.controls{display:flex;align-items:center;gap:.9rem;margin-top:.9rem;flex-wrap:wrap;}
.ctl-label{font-size:.72rem;color:var(--muted);white-space:nowrap;}
input[type=range]{flex:1;accent-color:var(--rose);min-width:80px;}
#count-display{font-size:.82rem;font-weight:500;color:var(--brown);width:1.8rem;}
.btn-extract{background:var(--brown);color:var(--linen);border:none;border-radius:3px;padding:.62rem 1.4rem;font-family:'Noto Sans JP',sans-serif;font-size:.82rem;font-weight:400;letter-spacing:.06em;cursor:pointer;transition:.2s;width:100%;margin-top:.7rem;}
.btn-extract:hover{background:var(--rose);}
.btn-extract:disabled{background:var(--muted);cursor:not-allowed;}

/* brand tabs */
#results-section{display:none;margin-top:1.8rem;}
.section-title{font-family:'Noto Serif JP',serif;font-size:.8rem;color:var(--muted);letter-spacing:.1em;margin-bottom:.8rem;padding-bottom:.45rem;border-bottom:1px solid var(--border);}
.brand-tabs{display:flex;gap:.4rem;margin-bottom:1rem;flex-wrap:wrap;}
.brand-tab{border:1px solid var(--border);background:var(--warm);border-radius:3px;padding:.3rem .85rem;font-size:.72rem;font-family:'Noto Sans JP',sans-serif;cursor:pointer;color:var(--muted);transition:.15s;}
.brand-tab:hover{border-color:var(--rose);color:var(--rose);}
.brand-tab.active{background:var(--brown);border-color:var(--brown);color:var(--linen);}
.brand-panel{display:none;}
.brand-panel.active{display:block;}

/* color cards */
.color-list{display:flex;flex-direction:column;gap:.55rem;}
.color-row{background:var(--warm);border:1px solid var(--border);border-radius:4px;display:flex;align-items:stretch;overflow:hidden;}
.row-rank{width:28px;display:flex;align-items:center;justify-content:center;font-size:.62rem;color:var(--muted);font-weight:500;flex-shrink:0;border-right:1px solid var(--border);}
.row-swatches{display:flex;flex-direction:column;width:56px;flex-shrink:0;}
.swatch-h{flex:1;position:relative;}
.swatch-label{position:absolute;bottom:2px;left:3px;font-size:.55rem;background:rgba(0,0,0,.3);color:#fff;padding:1px 3px;border-radius:2px;}
.row-info{flex:1;padding:.5rem .7rem;min-width:0;}
.thread-num{font-family:'Noto Serif JP',serif;font-size:1rem;font-weight:600;color:var(--brown);}
.thread-name{font-size:.68rem;color:var(--muted);margin-top:.08rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.hex-pair{display:flex;gap:.35rem;margin-top:.35rem;font-size:.63rem;color:var(--muted);font-family:monospace;}
.delta-badge{display:inline-block;font-size:.58rem;padding:1px 5px;border-radius:10px;margin-top:.28rem;font-weight:500;}
.delta-great{background:#E8F5E8;color:#2E7D32;}
.delta-good{background:#FFF8E1;color:#F57F17;}
.delta-fair{background:#FDE8E8;color:#C62828;}
.row-bar{width:54px;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:.4rem .3rem;border-left:1px solid var(--border);flex-shrink:0;}
.bar-track{width:8px;flex:1;background:var(--border);border-radius:4px;overflow:hidden;display:flex;flex-direction:column;justify-content:flex-end;max-height:60px;}
.bar-fill{width:100%;background:var(--rose);border-radius:4px;transition:height .4s ease;}
.bar-pct{font-size:.6rem;color:var(--muted);margin-top:.25rem;white-space:nowrap;}

/* loading */
.loading{text-align:center;padding:1.8rem;color:var(--muted);font-size:.8rem;display:none;}
.spinner{display:inline-block;width:20px;height:20px;border:2px solid var(--border);border-top-color:var(--rose);border-radius:50%;animation:spin .8s linear infinite;margin-bottom:.4rem;}
@keyframes spin{to{transform:rotate(360deg);}}
  .crown-badge{font-size:.85rem;}
  .color-row.best-brand{border-color:#D4A847;background:#FFFDF5;}
  .color-row.best-brand .thread-num{color:#A07800;}
  canvas#off-canvas{display:none;}
</style>
</head>
<body>
<header>
  <h1>🧵 刺繍糸カラーマッチャー</h1>
  <p>画像から色を抽出 → DMC / COSMO / オリムパス の糸番号を提案</p>
</header>
<main>
  <div class="left-col">
    <!-- Upload -->
    <div class="upload-zone" id="upload-zone">
      <input type="file" id="file-input" accept="image/*">
      <span class="upload-icon">🖼️</span>
      <h2>画像をアップロード</h2>
      <p>クリックまたはドラッグ&ドロップ</p>
      <p style="margin-top:.2rem">PNG / JPG / WEBP 対応</p>
    </div>

    <!-- Preview -->
    <div id="preview-section">
      <div class="toolbar">
        <button class="tb-btn active" id="btn-mode-pan">✋ 移動</button>
        <button class="tb-btn" id="btn-mode-sel">⬚ 範囲選択</button>
        <button class="btn-clear-sel" id="btn-clear-sel">✕ 選択解除</button>
        <span class="tb-sep"></span>
        <button class="zb" id="btn-zoom-out">−</button>
        <span class="zoom-label" id="zoom-label">100%</span>
        <button class="zb" id="btn-zoom-in">＋</button>
        <button class="zb" id="btn-zoom-fit" style="width:auto;padding:0 5px;font-size:.62rem;">FIT</button>
      </div>
      <div class="viewport" id="viewport">
        <canvas id="view-canvas"></canvas>
        <svg id="sel-overlay" width="100%" height="100%">
          <defs>
            <mask id="sel-mask">
              <rect id="mask-bg" width="100%" height="100%" fill="white"/>
              <rect id="mask-hole" fill="black"/>
            </mask>
          </defs>
          <rect id="dim-rect" width="100%" height="100%" fill="rgba(0,0,0,.48)" mask="url(#sel-mask)" visibility="hidden"/>
          <rect id="sel-rect" fill="none" stroke="white" stroke-width="1.5" stroke-dasharray="6,3" visibility="hidden"/>
          <rect id="drag-rect" fill="none" stroke="#C4866A" stroke-width="1.5" stroke-dasharray="6,3" visibility="hidden"/>
        </svg>
      </div>
      <div class="hint-bar" id="hint-bar"><b>移動モード</b>：ドラッグでパン ／ ホイール・ピンチでズーム</div>
      <button class="btn-extract" id="btn-extract">色を抽出して糸番号を探す</button>
    </div>

    <div class="loading" id="loading"><div class="spinner"></div><div>色を解析中…</div></div>
  </div>

  <div class="right-col">
    <div id="results-section">
      <p class="section-title">マッチング結果</p>
      <div class="brand-tabs">
        <button class="brand-tab active" data-brand="dmc">DMC</button>
        <button class="brand-tab" data-brand="cosmo">COSMO</button>
        <button class="brand-tab" data-brand="olympus">オリムパス</button>
      </div>
      <div id="panel-dmc" class="brand-panel active"><div class="color-list" id="list-dmc"></div></div>
      <div id="panel-cosmo" class="brand-panel"><div class="color-list" id="list-cosmo"></div></div>
      <div id="panel-olympus" class="brand-panel"><div class="color-list" id="list-olympus"></div></div>
    </div>
  </div>
</main>
<canvas id="off-canvas"></canvas>

function rgbToLab(r,g,b){
  let R=r/255,G=g/255,B=b/255;
  R=R>0.04045?Math.pow((R+0.055)/1.055,2.4):R/12.92;
  G=G>0.04045?Math.pow((G+0.055)/1.055,2.4):G/12.92;
  B=B>0.04045?Math.pow((B+0.055)/1.055,2.4):B/12.92;
  let X=(R*0.4124+G*0.3576+B*0.1805)/0.95047;
  let Y=(R*0.2126+G*0.7152+B*0.0722)/1.00000;
  let Z=(R*0.0193+G*0.1192+B*0.9505)/1.08883;
  const f=v=>v>0.008856?Math.pow(v,1/3):7.787*v+16/116;
  return[116*f(Y)-16,500*(f(X)-f(Y)),200*(f(Y)-f(Z))];
}
function deltaE(a,b){return Math.sqrt((a[0]-b[0])**2+(a[1]-b[1])**2+(a[2]-b[2])**2);}
function hexToRgb(hex){const n=parseInt(hex.slice(1),16);return[(n>>16)&255,(n>>8)&255,n&255];}
function toHex(r,g,b){return'#'+[r,g,b].map(v=>v.toString(16).padStart(2,'0')).join('');}

function findBest(r,g,b,db){
  const lab=rgbToLab(r,g,b);
  let best=db[0],bd=Infinity;
  for(const d of db){
    const [dr,dg,db2]=hexToRgb(d.h);
    const delta=deltaE(lab,rgbToLab(dr,dg,db2));
    if(delta<bd){bd=delta;best=d;}
  }
  return{thread:best,delta:bd};
}

// K-Means（クラスタサイズ付き）
function kMeansWithCount(pixels,k,iters=15){
  let centers=[];
  const used=new Set();
  while(centers.length<k){
    const i=Math.floor(Math.random()*pixels.length);
    if(!used.has(i)){used.add(i);centers.push([...pixels[i]]);}
  }
  let assign=new Array(pixels.length).fill(0);
  for(let it=0;it<iters;it++){
    const cl=Array.from({length:k},()=>[]);
    for(let pi=0;pi<pixels.length;pi++){
      const px=pixels[pi]; let best=0,bd=Infinity;
      for(let i=0;i<k;i++){
        const d=(px[0]-centers[i][0])**2+(px[1]-centers[i][1])**2+(px[2]-centers[i][2])**2;
        if(d<bd){bd=d;best=i;}
      }
      cl[best].push(px); assign[pi]=best;
    }
    centers=cl.map((c,i)=>c.length?[
      Math.round(c.reduce((s,p)=>s+p[0],0)/c.length),
      Math.round(c.reduce((s,p)=>s+p[1],0)/c.length),
      Math.round(c.reduce((s,p)=>s+p[2],0)/c.length)
    ]:centers[i]);
  }
  const counts=new Array(k).fill(0);
  for(const a of assign) counts[a]++;
  const total=pixels.length;
  return centers.map((c,i)=>({rgb:c,count:counts[i],pct:counts[i]/total*100}));
}

const viewport=document.getElementById('viewport');
const viewCanvas=document.getElementById('view-canvas');
const vCtx=viewCanvas.getContext('2d');
const selOverlay=document.getElementById('sel-overlay');
const dimRect=document.getElementById('dim-rect');
const maskHole=document.getElementById('mask-hole');
const selRect=document.getElementById('sel-rect');
const dragRect=document.getElementById('drag-rect');

let img=null, zoom=1, offsetX=0, offsetY=0;
let selection=null, mode='pan';
let panStart=null, panOffset0=null, selDragStart=null;
let pinchDist0=null, pinchZoom0=null, pinchCx=0, pinchCy=0;

function clampOffset(){
  const vpW=viewport.clientWidth, vpH=viewport.clientHeight;
  const iW=img.width*zoom, iH=img.height*zoom;
  if(iW<=vpW) offsetX=(vpW-iW)/2; else offsetX=Math.min(0,Math.max(vpW-iW,offsetX));
  if(iH<=vpH) offsetY=(vpH-iH)/2; else offsetY=Math.min(0,Math.max(vpH-iH,offsetY));
}
function applyZoom(nz,px,py){
  nz=Math.max(0.1,Math.min(20,nz));
  const r=nz/zoom;
  offsetX=px-(px-offsetX)*r; offsetY=py-(py-offsetY)*r;
  zoom=nz; clampOffset(); render();
}
function fitImage(){
  if(!img) return;
  const vpW=viewport.clientWidth, vpH=viewport.clientHeight;
  zoom=Math.min(vpW/img.width,vpH/img.height,1);
  offsetX=(vpW-img.width*zoom)/2; offsetY=(vpH-img.height*zoom)/2; render();
}
function render(){
  if(!img) return;
  const vpW=viewport.clientWidth, vpH=viewport.clientHeight;
  viewCanvas.width=vpW; viewCanvas.height=vpH;
  selOverlay.setAttribute('width',vpW); selOverlay.setAttribute('height',vpH);
  document.getElementById('mask-bg').setAttribute('width',vpW);
  document.getElementById('mask-bg').setAttribute('height',vpH);
  vCtx.clearRect(0,0,vpW,vpH);
  vCtx.imageSmoothingEnabled=zoom<2;
  vCtx.drawImage(img,offsetX,offsetY,img.width*zoom,img.height*zoom);
  document.getElementById('zoom-label').textContent=Math.round(zoom*100)+'%';
  if(selection){
    const sx=selection.x*zoom+offsetX, sy=selection.y*zoom+offsetY;
    const sw=selection.w*zoom, sh=selection.h*zoom;
    maskHole.setAttribute('x',sx); maskHole.setAttribute('y',sy);
    maskHole.setAttribute('width',sw); maskHole.setAttribute('height',sh);
    dimRect.setAttribute('visibility','visible');
    selRect.setAttribute('x',sx); selRect.setAttribute('y',sy);
    selRect.setAttribute('width',sw); selRect.setAttribute('height',sh);
    selRect.setAttribute('visibility','visible');
  } else {
    dimRect.setAttribute('visibility','hidden');
    selRect.setAttribute('visibility','hidden');
  }
}
function vpToImg(vx,vy){return{x:(vx-offsetX)/zoom,y:(vy-offsetY)/zoom};}
function evPos(e,idx=0){
  const r=viewport.getBoundingClientRect();
  const s=e.touches?e.touches[idx]:e;
  return{x:s.clientX-r.left,y:s.clientY-r.top};
}

viewport.addEventListener('wheel',e=>{
  e.preventDefault();
  const p=evPos(e);
  applyZoom(zoom*(e.deltaY>0?0.85:1/0.85),p.x,p.y);
},{passive:false});

viewport.addEventListener('mousedown',e=>{
  e.preventDefault(); const p=evPos(e);
  if(mode==='pan'){panStart=p;panOffset0={x:offsetX,y:offsetY};}
  else{const ip=vpToImg(p.x,p.y);selDragStart={vx:p.x,vy:p.y,ix:ip.x,iy:ip.y};}
});
window.addEventListener('mousemove',e=>{
  if(mode==='pan'&&panStart){
    const p=evPos(e);
    offsetX=panOffset0.x+(p.x-panStart.x); offsetY=panOffset0.y+(p.y-panStart.y);
    clampOffset(); render();
  } else if(mode==='sel'&&selDragStart){
    const p=evPos(e);
    const x=Math.min(selDragStart.vx,p.x),y=Math.min(selDragStart.vy,p.y);
    dragRect.setAttribute('x',x);dragRect.setAttribute('y',y);
    dragRect.setAttribute('width',Math.abs(p.x-selDragStart.vx));
    dragRect.setAttribute('height',Math.abs(p.y-selDragStart.vy));
    dragRect.setAttribute('visibility','visible');
  }
});
window.addEventListener('mouseup',e=>{
  if(mode==='pan'&&panStart){panStart=null;}
  else if(mode==='sel'&&selDragStart){
    const p=evPos(e); const ip=vpToImg(p.x,p.y);
    const ix=Math.min(selDragStart.ix,ip.x),iy=Math.min(selDragStart.iy,ip.y);
    const iw=Math.abs(ip.x-selDragStart.ix),ih=Math.abs(ip.y-selDragStart.iy);
    dragRect.setAttribute('visibility','hidden'); selDragStart=null;
    if(iw<2||ih<2) return;
    selection={x:Math.max(0,ix),y:Math.max(0,iy),
      w:Math.min(iw,img.width-Math.max(0,ix)),h:Math.min(ih,img.height-Math.max(0,iy))};
    document.getElementById('btn-clear-sel').style.display='inline-block';
    updateHint(); render();
  }
});
viewport.addEventListener('touchstart',e=>{
  e.preventDefault();
  if(e.touches.length===2){
    panStart=null;selDragStart=null;
    pinchDist0=Math.hypot(evPos(e,0).x-evPos(e,1).x,evPos(e,0).y-evPos(e,1).y);
    pinchZoom0=zoom;
    pinchCx=(evPos(e,0).x+evPos(e,1).x)/2;pinchCy=(evPos(e,0).y+evPos(e,1).y)/2;
  } else {
    const p=evPos(e); pinchDist0=null;
    if(mode==='pan'){panStart=p;panOffset0={x:offsetX,y:offsetY};}
    else{const ip=vpToImg(p.x,p.y);selDragStart={vx:p.x,vy:p.y,ix:ip.x,iy:ip.y};}
  }
},{passive:false});
viewport.addEventListener('touchmove',e=>{
  e.preventDefault();
  if(e.touches.length===2&&pinchDist0!==null){
    const d=Math.hypot(evPos(e,0).x-evPos(e,1).x,evPos(e,0).y-evPos(e,1).y);
    const cx=(evPos(e,0).x+evPos(e,1).x)/2, cy=(evPos(e,0).y+evPos(e,1).y)/2;
    const c={x:cx,y:cy};
    applyZoom(pinchZoom0*(d/pinchDist0),c.x,c.y);
  } else if(e.touches.length===1){
    const p=evPos(e);
    if(mode==='pan'&&panStart){
      offsetX=panOffset0.x+(p.x-panStart.x);offsetY=panOffset0.y+(p.y-panStart.y);
      clampOffset();render();
    } else if(mode==='sel'&&selDragStart){
      const x=Math.min(selDragStart.vx,p.x),y=Math.min(selDragStart.vy,p.y);
      dragRect.setAttribute('x',x);dragRect.setAttribute('y',y);
      dragRect.setAttribute('width',Math.abs(p.x-selDragStart.vx));
      dragRect.setAttribute('height',Math.abs(p.y-selDragStart.vy));
      dragRect.setAttribute('visibility','visible');
    }
  }
},{passive:false});
viewport.addEventListener('touchend',e=>{
  e.preventDefault();
  if(pinchDist0!==null){pinchDist0=null;return;}
  if(mode==='sel'&&selDragStart){
    const t=e.changedTouches[0];
    const r=viewport.getBoundingClientRect();
    const vp={x:t.clientX-r.left,y:t.clientY-r.top};
    const ip=vpToImg(vp.x,vp.y);
    const ix=Math.min(selDragStart.ix,ip.x),iy=Math.min(selDragStart.iy,ip.y);
    const iw=Math.abs(ip.x-selDragStart.ix),ih=Math.abs(ip.y-selDragStart.iy);
    dragRect.setAttribute('visibility','hidden');selDragStart=null;
    if(iw<2||ih<2) return;
    selection={x:Math.max(0,ix),y:Math.max(0,iy),
      w:Math.min(iw,img.width-Math.max(0,ix)),h:Math.min(ih,img.height-Math.max(0,iy))};
    document.getElementById('btn-clear-sel').style.display='inline-block';
    updateHint();render();
  }
  panStart=null;
},{passive:false});

function updateHint(){
  const bar=document.getElementById('hint-bar');
  if(mode==='pan') bar.innerHTML='<b>移動モード</b>：ドラッグでパン ／ ホイール・ピンチでズーム';
  else bar.innerHTML=selection
    ?'<b>選択範囲</b>あり ─ 再ドラッグで描き直せます'
    :'<b>範囲選択モード</b>：ドラッグで選択範囲を描きます';
}
function updateCursor(){viewport.style.cursor=mode==='pan'?'grab':'crosshair';}

document.getElementById('btn-mode-pan').addEventListener('click',()=>{
  mode='pan';
  document.getElementById('btn-mode-pan').classList.add('active');
  document.getElementById('btn-mode-sel').classList.remove('active');
  updateCursor();updateHint();
});
document.getElementById('btn-mode-sel').addEventListener('click',()=>{
  mode='sel';
  document.getElementById('btn-mode-sel').classList.add('active');
  document.getElementById('btn-mode-pan').classList.remove('active');
  updateCursor();updateHint();
});
document.getElementById('btn-clear-sel').addEventListener('click',()=>{
  selection=null;
  document.getElementById('btn-clear-sel').style.display='none';
  updateHint();render();
});
document.getElementById('btn-zoom-in').addEventListener('click',()=>applyZoom(zoom*1.5,viewport.clientWidth/2,viewport.clientHeight/2));
document.getElementById('btn-zoom-out').addEventListener('click',()=>applyZoom(zoom/1.5,viewport.clientWidth/2,viewport.clientHeight/2));
document.getElementById('btn-zoom-fit').addEventListener('click',fitImage);
window.addEventListener('resize',()=>{if(img)render();});

// ── ファイル読み込み ──
const fileInput=document.getElementById('file-input');
const uploadZone=document.getElementById('upload-zone');
const previewSection=document.getElementById('preview-section');
const resultsSection=document.getElementById('results-section');

uploadZone.addEventListener('dragover',e=>{e.preventDefault();uploadZone.classList.add('drag-over');});
uploadZone.addEventListener('dragleave',()=>uploadZone.classList.remove('drag-over'));
uploadZone.addEventListener('drop',e=>{
  e.preventDefault();uploadZone.classList.remove('drag-over');
  const f=e.dataTransfer.files[0];
  if(f&&f.type.startsWith('image/')) loadFile(f);
});
fileInput.addEventListener('change',()=>{if(fileInput.files[0])loadFile(fileInput.files[0]);});

function loadFile(file){
  const reader=new FileReader();
  reader.onload=e=>{
    const image=new Image();
    image.onload=()=>{
      img=image; selection=null;
      document.getElementById('btn-clear-sel').style.display='none';
      previewSection.style.display='block';
      resultsSection.style.display='none';
      requestAnimationFrame(()=>{fitImage();updateHint();});
    };
    image.src=e.target.result;
  };
  reader.readAsDataURL(file);
}

// ── 抽出モード ──

// ── ブランドタブ ──
document.querySelectorAll('.brand-tab').forEach(tab=>{
  tab.addEventListener('click',()=>{
    document.querySelectorAll('.brand-tab').forEach(t=>t.classList.remove('active'));
    document.querySelectorAll('.brand-panel').forEach(p=>p.classList.remove('active'));
    tab.classList.add('active');
    document.getElementById('panel-'+tab.dataset.brand).classList.add('active');
  });
});

// ── 色抽出 ──
const offCanvas=document.getElementById('off-canvas');
const offCtx=offCanvas.getContext('2d');
const loading=document.getElementById('loading');

function buildCard(rank,extractedRgb,thread,delta,pct,showBar,isBest){
  const hex=toHex(...extractedRgb);
  const bc=delta<10?'delta-great':delta<20?'delta-good':'delta-fair';
  const bt=delta<10?'高精度':delta<20?'良好':'近似';
  const barH=Math.min(Math.round(pct),100);
  const crown=isBest?'<span class="crown-badge" title="このメーカーが最も近い色">👑</span>':'';
  return `<div class="color-row${isBest?' best-brand':''}">
    <div class="row-rank">${rank}</div>
    <div class="row-swatches">
      <div class="swatch-h" style="background:${hex}"><span class="swatch-label">抽出</span></div>
      <div class="swatch-h" style="background:${thread.h}"><span class="swatch-label">糸</span></div>
    </div>
    <div class="row-info">
      <div class="thread-num">${thread.n} ${crown}</div>
      <div class="thread-name">${thread.name}</div>
      <div class="hex-pair"><span>${hex.toUpperCase()}</span><span>→</span><span>${thread.h.toUpperCase()}</span></div>
      <span class="delta-badge ${bc}">${bt} ΔE ${delta.toFixed(1)}</span>
    </div>
    ${showBar?`<div class="row-bar">
      <div class="bar-track"><div class="bar-fill" style="height:${barH}%"></div></div>
      <div class="bar-pct">${pct.toFixed(1)}%</div>
    </div>`:''}
  </div>`;
}

document.getElementById('btn-extract').addEventListener('click',()=>{
  if(!img) return;
  document.getElementById('btn-extract').disabled=true;
  loading.style.display='block';
  resultsSection.style.display='none';

  setTimeout(()=>{
    const k=5;
    let sx=0,sy=0,sw=img.width,sh=img.height;
    if(selection){
      sx=Math.max(0,Math.round(selection.x)); sy=Math.max(0,Math.round(selection.y));
      sw=Math.min(Math.round(selection.w),img.width-sx);
      sh=Math.min(Math.round(selection.h),img.height-sy);
    }
    const maxSize=300;
    const scale=Math.min(maxSize/sw,maxSize/sh,1);
    offCanvas.width=Math.max(1,Math.round(sw*scale));
    offCanvas.height=Math.max(1,Math.round(sh*scale));
    offCtx.drawImage(img,sx,sy,sw,sh,0,0,offCanvas.width,offCanvas.height);

    const data=offCtx.getImageData(0,0,offCanvas.width,offCanvas.height).data;
    const pixels=[];
    for(let i=0;i<data.length;i+=4){
      if(data[i+3]<128) continue;
      pixels.push([data[i],data[i+1],data[i+2]]);
    }
    const sampled=pixels.length>3000
      ?Array.from({length:3000},()=>pixels[Math.floor(Math.random()*pixels.length)])
      :pixels;

    const results=kMeansWithCount(sampled,k);
    const sorted=[...results].sort((a,b)=>b.count-a.count);
    const showBar=true;

    // 各色について全ブランドのΔEを事前計算し、最小ブランドを特定
    const brandKeys=Object.keys(BRANDS);
    const allMatches=sorted.map(item=>{
      const m={};
      for(const [brand,db] of Object.entries(BRANDS)){
        m[brand]=findBest(...item.rgb,db);
      }
      const bestBrand=brandKeys.reduce((a,b)=>m[a].delta<=m[b].delta?a:b);
      return{item,m,bestBrand};
    });

    // タブに王冠を表示（1色でも最高ならタブに王冠）
    const crownCount={dmc:0,cosmo:0,olympus:0};
    for(const {bestBrand} of allMatches) crownCount[bestBrand]++;
    document.querySelectorAll('.brand-tab').forEach(tab=>{
      const b=tab.dataset.brand;
      tab.textContent='';
      const labels={dmc:'DMC',cosmo:'COSMO',olympus:'オリムパス'};
      tab.textContent=labels[b];
      if(crownCount[b]>0){
        const c=document.createElement('span');
        c.textContent=' 👑';
        c.title=`${crownCount[b]}色でベストマッチ`;
        tab.appendChild(c);
      }
    });

    // 各ブランドのカードを構築
    for(const brand of brandKeys){
      const list=document.getElementById('list-'+brand);
      list.innerHTML='';
      allMatches.forEach(({item,m,bestBrand},i)=>{
        const {thread,delta}=m[brand];
        const isBest=bestBrand===brand;
        list.innerHTML+=buildCard(i+1,item.rgb,thread,delta,item.pct,showBar,isBest);
      });
    }

    loading.style.display='none';
    resultsSection.style.display='block';
    document.getElementById('btn-extract').disabled=false;
  },50);
});
</script>
