<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>刺繍糸カラーマッチング</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🧵</text></svg>">
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;600&family=Noto+Sans+JP:wght@300;400;500&display=swap');
:root{
  --linen:#F5EFE6; --warm:#FDFAF6; --brown:#5C3D2E;
  --rose:#C4866A; --ink:#2C1F14; --muted:#9B8B7E; --border:#E2D5C8;
  --sage:#5C7A6B; --warn:#C0532A; --warn-bg:#F3DCC9;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--linen);color:var(--ink);font-family:'Noto Sans JP',sans-serif;font-weight:300;min-height:100vh;}

/* ── ヘッダー ── */
header{background:var(--brown);padding:1.4rem 1rem 1.1rem;text-align:center;}
header h1{font-family:'Noto Serif JP',serif;font-size:1.35rem;color:var(--linen);letter-spacing:.1em;font-weight:600;}
header p{color:var(--rose);font-size:.9rem;letter-spacing:.06em;margin-top:.3rem;}

/* ── タブナビ ── */
.app-tabs{display:flex;background:var(--brown);border-top:1px solid rgba(255,255,255,.12);}
.app-tab{flex:1;padding:.7rem;font-size:.85rem;font-family:'Noto Sans JP',sans-serif;font-weight:400;color:rgba(253,243,230,.6);background:none;border:none;cursor:pointer;letter-spacing:.05em;transition:.15s;border-bottom:2px solid transparent;}
.app-tab:hover{color:var(--linen);}
.app-tab.active{color:var(--linen);border-bottom-color:var(--rose);}

/* ── ページ ── */
.page{display:none;}.page.active{display:block;}

/* ══════════════════════════════════
   カラーマッチャー
══════════════════════════════════ */
.matcher-main{
  display:grid;grid-template-columns:1fr;gap:1.2rem;
  max-width:1200px;margin:0 auto;padding:1.4rem 1rem 3rem;
}
@media(min-width:768px){
  .matcher-main{grid-template-columns:1fr 1fr;align-items:start;padding:1.8rem 1.5rem 3rem;}
}
.left-col{display:flex;flex-direction:column;gap:1rem;}
.right-col{display:flex;flex-direction:column;gap:1rem;}

/* upload */
.upload-zone{border:2px dashed var(--border);border-radius:4px;background:var(--warm);padding:2rem 1rem;text-align:center;cursor:pointer;transition:.2s;position:relative;}
.upload-zone:hover,.upload-zone.drag-over{border-color:var(--rose);background:#FDF6F0;}
.upload-zone input{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%;}
.upload-icon{font-size:2.4rem;margin-bottom:.5rem;display:block;}
.upload-zone h2{font-size:1.1rem;font-weight:500;color:var(--brown);font-family:'Noto Serif JP',serif;margin-bottom:.25rem;}
.upload-zone p{font-size:.9rem;color:var(--muted);}

/* preview */
#preview-section{display:none;}
.toolbar{display:flex;align-items:center;gap:.4rem;margin-bottom:.5rem;flex-wrap:wrap;}
.tb-btn{border:1px solid var(--border);background:var(--warm);border-radius:3px;padding:.4rem .85rem;font-size:.85rem;font-family:'Noto Sans JP',sans-serif;cursor:pointer;color:var(--muted);transition:.15s;white-space:nowrap;}
.tb-btn:hover{border-color:var(--rose);color:var(--rose);}
.tb-btn.active{background:var(--brown);border-color:var(--brown);color:var(--linen);}
.tb-sep{flex:1;}
.zoom-label{font-size:.82rem;color:var(--muted);min-width:3rem;text-align:right;}
.zb{border:1px solid var(--border);background:var(--warm);border-radius:3px;width:30px;height:30px;font-size:1rem;cursor:pointer;color:var(--brown);display:flex;align-items:center;justify-content:center;padding:0;}
.zb:hover{border-color:var(--rose);}
.viewport{width:100%;height:360px;border:1px solid var(--border);border-radius:4px;background:#1a1210;overflow:hidden;position:relative;user-select:none;-webkit-user-select:none;touch-action:none;}
#view-canvas{position:absolute;top:0;left:0;}
#sel-overlay{position:absolute;top:0;left:0;pointer-events:none;}
.hint-bar{font-size:.82rem;color:var(--muted);margin-top:.35rem;text-align:center;min-height:1em;}
.hint-bar b{color:var(--rose);font-weight:500;}
.btn-clear-sel{display:none;background:none;border:1px solid var(--border);border-radius:3px;padding:.32rem .85rem;font-size:.82rem;color:var(--muted);cursor:pointer;margin-top:.3rem;font-family:'Noto Sans JP',sans-serif;}
.btn-clear-sel:hover{border-color:var(--rose);color:var(--rose);}
.btn-extract{background:var(--brown);color:var(--linen);border:none;border-radius:3px;padding:.75rem 1.4rem;font-family:'Noto Sans JP',sans-serif;font-size:1rem;font-weight:400;letter-spacing:.06em;cursor:pointer;transition:.2s;width:100%;margin-top:.7rem;}
.btn-extract:hover{background:var(--rose);}
.btn-extract:disabled{background:var(--muted);cursor:not-allowed;}

/* 結果 */
#results-section{display:none;}
.section-title{font-family:'Noto Serif JP',serif;font-size:.95rem;color:var(--muted);letter-spacing:.1em;margin-bottom:.8rem;padding-bottom:.45rem;border-bottom:1px solid var(--border);}
.brand-tabs{display:flex;gap:.4rem;margin-bottom:1rem;flex-wrap:wrap;}
.brand-tab{border:1px solid var(--border);background:var(--warm);border-radius:3px;padding:.4rem 1rem;font-size:.88rem;font-family:'Noto Sans JP',sans-serif;cursor:pointer;color:var(--muted);transition:.15s;}
.brand-tab:hover{border-color:var(--rose);color:var(--rose);}
.brand-tab.active{background:var(--brown);border-color:var(--brown);color:var(--linen);}
.brand-panel{display:none;}.brand-panel.active{display:block;}
.color-list{display:flex;flex-direction:column;gap:.65rem;}
.color-row{background:var(--warm);border:1px solid var(--border);border-radius:4px;display:flex;align-items:stretch;overflow:hidden;}
.row-rank{width:32px;display:flex;align-items:center;justify-content:center;font-size:.8rem;color:var(--muted);font-weight:500;flex-shrink:0;border-right:1px solid var(--border);}
.row-swatches{display:flex;flex-direction:column;width:64px;flex-shrink:0;}
.swatch-h{flex:1;position:relative;}
.swatch-label{position:absolute;bottom:2px;left:3px;font-size:.65rem;background:rgba(0,0,0,.3);color:#fff;padding:1px 4px;border-radius:2px;}
.row-info{flex:1;padding:.6rem .85rem;min-width:0;}
.thread-num{font-family:'Noto Serif JP',serif;font-size:1.2rem;font-weight:600;color:var(--brown);display:flex;align-items:center;gap:.4rem;}
.thread-name{font-size:.85rem;color:var(--muted);margin-top:.08rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.hex-pair{display:flex;gap:.35rem;margin-top:.4rem;font-size:.78rem;color:var(--muted);font-family:monospace;}
.delta-badge{display:inline-block;font-size:.75rem;padding:2px 6px;border-radius:10px;margin-top:.3rem;font-weight:500;}
.delta-great{background:#E8F5E8;color:#2E7D32;}
.delta-good{background:#FFF8E1;color:#F57F17;}
.delta-fair{background:#FDE8E8;color:#C62828;}
.row-bar{width:58px;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:.4rem .3rem;border-left:1px solid var(--border);flex-shrink:0;}
.bar-track{width:8px;flex:1;background:var(--border);border-radius:4px;overflow:hidden;display:flex;flex-direction:column;justify-content:flex-end;max-height:60px;}
.bar-fill{width:100%;background:var(--rose);border-radius:4px;transition:height .4s ease;}
.bar-pct{font-size:.75rem;color:var(--muted);margin-top:.25rem;white-space:nowrap;}
.crown-badge{font-size:.85rem;}
.check-badge{font-size:1rem;color:#2E7D32;} /* ✅在庫あり */
.color-row.best-brand{border-color:#D4A847;background:#FFFDF5;}
.color-row.best-brand .thread-num{color:#A07800;}
.color-row.in-stock{border-left:3px solid #2E7D32;}

/* loading */
.loading{text-align:center;padding:1.8rem;color:var(--muted);font-size:.95rem;display:none;}
.spinner{display:inline-block;width:20px;height:20px;border:2px solid var(--border);border-top-color:var(--rose);border-radius:50%;animation:spin .8s linear infinite;margin-bottom:.4rem;}
@keyframes spin{to{transform:rotate(360deg);}}
#off-canvas{display:none;}

/* ══════════════════════════════════
   在庫管理
══════════════════════════════════ */
.inv-wrap{max-width:1100px;margin:0 auto;padding:1.4rem 1rem 3rem;}
.inv-header{display:flex;justify-content:space-between;align-items:flex-end;flex-wrap:wrap;gap:1rem;margin-bottom:1.4rem;}
.inv-title-block{}
.inv-eyebrow{display:inline-flex;align-items:center;gap:.35rem;font-size:1.8rem;letter-spacing:.05em;color:var(--rose);font-weight:600;font-family:'Noto Serif JP',serif;}
.inv-title{font-family:'Noto Serif JP',serif;font-size:2rem;font-weight:600;margin-top:.2rem;letter-spacing:-.01em;}
.inv-stats{display:flex;gap:.6rem;}
.inv-stat{background:var(--warm);border:1px solid var(--border);border-radius:8px;padding:.5rem .9rem;display:flex;align-items:baseline;gap:.35rem;}
.inv-stat strong{font-family:'Noto Serif JP',serif;font-size:1.2rem;}
.inv-stat span{font-size:.72rem;color:var(--muted);}
.inv-stat-warn{border-color:var(--warn);background:var(--warn-bg);}
.inv-stat-warn strong,.inv-stat-warn span{color:var(--warn);}

.inv-toolbar{display:flex;gap:.6rem;flex-wrap:wrap;margin-bottom:1.2rem;align-items:stretch;}
.inv-search{flex:1 1 200px;display:flex;align-items:center;gap:.5rem;background:var(--warm);border:1px solid var(--border);border-radius:8px;padding:0 .75rem;color:var(--muted);}
.inv-search input{border:none;background:none;outline:none;padding:.6rem 0;font-size:.9rem;color:var(--ink);width:100%;font-family:'Noto Sans JP',sans-serif;}
.inv-select{background:var(--warm);border:1px solid var(--border);border-radius:8px;padding:.6rem .75rem;font-size:.85rem;color:var(--ink);font-family:'Noto Sans JP',sans-serif;outline:none;cursor:pointer;}
.inv-btn{display:inline-flex;align-items:center;gap:.4rem;border-radius:8px;border:1px solid transparent;padding:.6rem 1rem;font-size:.85rem;font-weight:500;cursor:pointer;font-family:'Noto Sans JP',sans-serif;white-space:nowrap;}
.inv-btn-solid{background:var(--brown);color:var(--linen);}
.inv-btn-solid:hover{background:var(--rose);}
.inv-btn-ghost{background:transparent;border-color:var(--border);color:var(--ink);}
.inv-btn-ghost:hover{background:rgba(0,0,0,.03);}
.inv-btn-danger{background:var(--warn);color:#fff;}
.inv-btn-danger:hover{background:#a8431f;}
.inv-btn-solid:disabled{opacity:.45;cursor:not-allowed;}

.inv-empty{display:flex;flex-direction:column;align-items:center;text-align:center;gap:.7rem;padding:4rem 1rem;border:1px dashed var(--border);border-radius:12px;background:rgba(255,255,255,.3);}
.inv-empty h3{font-family:'Noto Serif JP',serif;font-size:1.3rem;margin:.3rem 0 0;}
.inv-empty p{color:var(--muted);font-size:.85rem;max-width:340px;}

.inv-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:.9rem;}
.inv-card{background:var(--warm);border:1px solid var(--border);border-radius:10px;padding:1rem;display:flex;gap:.9rem;position:relative;}
.inv-card-swatch{width:44px;height:56px;border-radius:6px;flex-shrink:0;border:1px solid rgba(0,0,0,.08);}
.inv-card-info{flex:1;min-width:0;}
.inv-card-top{display:flex;align-items:baseline;gap:.5rem;flex-wrap:wrap;}
.inv-brand-tag{font-size:.68rem;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);}
.inv-code{font-family:'Noto Serif JP',serif;font-size:1rem;font-weight:600;}
.inv-color-name{font-size:.78rem;color:var(--muted);margin:.1rem 0 0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.inv-qty-row{display:flex;gap:.4rem;flex-wrap:wrap;margin-top:.6rem;}
.inv-pill{font-size:.68rem;background:rgba(0,0,0,.04);border-radius:999px;padding:2px 8px;color:var(--muted);display:inline-flex;align-items:center;gap:.25rem;}
.inv-pill-low{background:var(--warn-bg);color:var(--warn);font-weight:500;}
.inv-project{font-size:.72rem;margin:.5rem 0 0;color:var(--ink);}
.inv-notes{font-size:.72rem;margin:.25rem 0 0;color:var(--muted);}
.inv-card-actions{display:flex;flex-direction:column;gap:.25rem;}
.inv-icon-btn{border:none;background:none;color:var(--muted);cursor:pointer;padding:.35rem;border-radius:6px;display:flex;font-size:1rem;}
.inv-icon-btn:hover{background:rgba(0,0,0,.05);color:var(--ink);}
.inv-icon-btn.danger:hover{color:var(--warn);}

/* モーダル */
.inv-overlay{position:fixed;inset:0;background:rgba(44,31,20,.45);display:flex;align-items:center;justify-content:center;padding:1rem;z-index:100;}
.inv-sheet{background:var(--warm);border-radius:12px;width:100%;max-width:440px;max-height:90vh;overflow-y:auto;border:1px solid var(--border);}
.inv-sheet-head{display:flex;justify-content:space-between;align-items:center;padding:1.1rem 1.2rem 0;}
.inv-sheet-head h2{font-family:'Noto Serif JP',serif;font-size:1.3rem;margin:0;}
.inv-sheet-body{padding:.9rem 1.2rem;display:flex;flex-direction:column;gap:.9rem;}
.inv-sheet-foot{display:flex;justify-content:flex-end;gap:.5rem;padding:.9rem 1.2rem 1.2rem;border-top:1px solid var(--border);margin-top:.25rem;}
.inv-preview-row{display:flex;align-items:center;gap:.9rem;background:rgba(0,0,0,.025);border-radius:8px;padding:.75rem;}
.inv-preview-swatch{width:44px;height:56px;border-radius:6px;flex-shrink:0;border:1px solid rgba(0,0,0,.08);}
.inv-preview-text{display:flex;flex-direction:column;gap:.15rem;}
.inv-preview-text .mono{font-family:monospace;font-size:.9rem;}
.inv-preview-text .muted{font-size:.75rem;color:var(--muted);}
.inv-field-row{display:flex;gap:.6rem;}
.inv-field-row .inv-field{flex:1;}
.inv-field{display:flex;flex-direction:column;gap:.3rem;font-size:.78rem;color:var(--muted);}
.inv-field span{display:flex;align-items:center;gap:.35rem;}
.inv-field input,.inv-field select,.inv-field textarea{font-family:'Noto Sans JP',sans-serif;font-size:.9rem;color:var(--ink);background:#fff;border:1px solid var(--border);border-radius:6px;padding:.5rem .65rem;outline:none;resize:vertical;}
.inv-field input:focus,.inv-field select:focus,.inv-field textarea:focus{border-color:var(--rose);}
.inv-field input[type=range]{padding:0;accent-color:var(--rose);}
.inv-color-pick-row{display:flex;gap:.5rem;align-items:center;}
.inv-color-pick-row input[type=color]{width:40px;height:36px;padding:2px;border-radius:6px;border:1px solid var(--border);cursor:pointer;}
.inv-color-pick-row input[type=text]{flex:1;}
.match-tag{font-size:.68rem;font-weight:500;padding:1px 6px;border-radius:999px;}
.match-ok{background:rgba(92,122,107,.18);color:var(--sage);}
.match-warn{background:var(--warn-bg);color:var(--warn);}
.inv-hint{font-size:.75rem;color:var(--muted);margin:-.4rem 0 0;}
.inv-confirm{background:var(--warm);border-radius:10px;padding:1.4rem;max-width:300px;border:1px solid var(--border);text-align:center;}
.inv-confirm p{margin:0 0 1rem;font-size:.9rem;}
.inv-confirm-actions{display:flex;gap:.5rem;justify-content:center;}
.inv-save-indicator{position:fixed;bottom:1rem;right:1rem;background:var(--ink);color:var(--warm);font-size:.75rem;padding:.35rem .75rem;border-radius:999px;opacity:.85;z-index:200;}
.inv-error{background:var(--warn-bg);border:1px solid var(--warn);color:var(--warn);border-radius:8px;padding:.65rem .9rem;font-size:.82rem;margin-bottom:1rem;}

/* ── アプリタブ ── */
.app-tabs{display:flex;background:var(--brown);border-top:1px solid rgba(255,255,255,.12);}
.app-tab{flex:1;padding:.7rem;font-size:.85rem;font-family:'Noto Sans JP',sans-serif;font-weight:400;color:rgba(253,243,230,.6);background:none;border:none;cursor:pointer;letter-spacing:.05em;transition:.15s;border-bottom:2px solid transparent;}
.app-tab:hover{color:var(--linen);}
.app-tab.active{color:var(--linen);border-bottom-color:var(--rose);}
.page{display:none;}.page.active{display:block;}
.check-badge{font-size:1rem;color:#2E7D32;}
.color-row.in-stock{border-left:3px solid #2E7D32;}

.inv-preview-text .mono{font-family:monospace;font-size:.9rem;}
.inv-preview-text .muted{font-size:.75rem;color:var(--muted);}
.inv-field-row{display:flex;gap:.6rem;}
.inv-field-row .inv-field{flex:1;}
.inv-field{display:flex;flex-direction:column;gap:.3rem;font-size:.78rem;color:var(--muted);}
.inv-field span{display:flex;align-items:center;gap:.35rem;}
.inv-field input,.inv-field select,.inv-field textarea{font-family:'Noto Sans JP',sans-serif;font-size:.9rem;color:var(--ink);background:#fff;border:1px solid var(--border);border-radius:6px;padding:.5rem .65rem;outline:none;resize:vertical;}
.inv-field input:focus,.inv-field select:focus,.inv-field textarea:focus{border-color:var(--rose);}
.inv-field input[type=range]{padding:0;accent-color:var(--rose);}
.inv-color-pick-row{display:flex;gap:.5rem;align-items:center;}
.inv-color-pick-row input[type=color]{width:40px;height:36px;padding:2px;border-radius:6px;border:1px solid var(--border);cursor:pointer;}
.inv-color-pick-row input[type=text]{flex:1;}
.match-tag{font-size:.68rem;font-weight:500;padding:1px 6px;border-radius:999px;}
.match-ok{background:rgba(92,122,107,.18);color:#5C7A6B;}
.match-warn{background:#F3DCC9;color:#C0532A;}
.inv-hint{font-size:.75rem;color:var(--muted);}
.inv-confirm{background:var(--warm);border-radius:10px;padding:1.4rem;max-width:300px;border:1px solid var(--border);text-align:center;}
.inv-confirm p{margin:0 0 1rem;font-size:.9rem;}
.inv-confirm-actions{display:flex;gap:.5rem;justify-content:center;}
.inv-save-indicator{position:fixed;bottom:1rem;right:1rem;background:var(--ink);color:var(--warm);font-size:.75rem;padding:.35rem .75rem;border-radius:999px;opacity:.85;z-index:200;}

</style>
</head>
<body>

<nav class="app-tabs">
  <button class="app-tab active" data-tab="inventory">🗃️ 糸箱</button>
  <button class="app-tab" data-tab="matcher">🎨 カラーマッチング</button>
</nav>

<!-- ═══ カラーマッチャー ═══ -->
<div id="page-matcher" class="page">
  <div class="matcher-main">
    <div class="left-col">
      <p style="font-size:.82rem;color:var(--muted);text-align:center;padding:.5rem 0;">画像から色を抽出 → DMC / COSMO / オリムパス の糸番号を提案</p>
      <div class="upload-zone" id="upload-zone">
        <input type="file" id="file-input" accept="image/*">
        <span class="upload-icon">🖼️</span>
        <h2>画像をアップロード</h2>
        <p>クリックまたはドラッグ&ドロップ</p>
        <p style="margin-top:.2rem">PNG / JPG / WEBP 対応</p>
      </div>
      <div id="preview-section">
        <div class="toolbar">
          <button class="tb-btn active" id="btn-mode-pan">✋ 移動</button>
          <button class="tb-btn" id="btn-mode-sel">⬚ 範囲選択</button>
          <button class="btn-clear-sel" id="btn-clear-sel">✕ 選択解除</button>
          <span class="tb-sep"></span>
          <button class="zb" id="btn-zoom-out">−</button>
          <span class="zoom-label" id="zoom-label">100%</span>
          <button class="zb" id="btn-zoom-in">＋</button>
          <button class="zb" id="btn-zoom-fit" style="width:auto;padding:0 5px;font-size:.62rem;">FIT</button>
        </div>
        <div class="viewport" id="viewport">
          <canvas id="view-canvas"></canvas>
          <svg id="sel-overlay" width="100%" height="100%">
            <defs><mask id="sel-mask"><rect id="mask-bg" width="100%" height="100%" fill="white"/><rect id="mask-hole" fill="black"/></mask></defs>
            <rect id="dim-rect" width="100%" height="100%" fill="rgba(0,0,0,.48)" mask="url(#sel-mask)" visibility="hidden"/>
            <rect id="sel-rect" fill="none" stroke="white" stroke-width="1.5" stroke-dasharray="6,3" visibility="hidden"/>
            <rect id="drag-rect" fill="none" stroke="#C4866A" stroke-width="1.5" stroke-dasharray="6,3" visibility="hidden"/>
          </svg>
        </div>
        <div class="hint-bar" id="hint-bar"><b>移動モード</b>：ドラッグでパン ／ ホイール・ピンチでズーム</div>
        <button class="btn-extract" id="btn-extract">色を抽出して糸番号を探す</button>
      </div>
      <div class="loading" id="loading"><div class="spinner"></div><div>色を解析中…</div></div>
    </div>
    <div class="right-col">
      <div id="results-section">
        <p class="section-title">マッチング結果</p>
        <div class="brand-tabs">
          <button class="brand-tab active" data-brand="dmc">DMC</button>
          <button class="brand-tab" data-brand="cosmo">COSMO</button>
          <button class="brand-tab" data-brand="olympus">オリムパス</button>
        </div>
        <div id="panel-dmc" class="brand-panel active"><div class="color-list" id="list-dmc"></div></div>
        <div id="panel-cosmo" class="brand-panel"><div class="color-list" id="list-cosmo"></div></div>
        <div id="panel-olympus" class="brand-panel"><div class="color-list" id="list-olympus"></div></div>
      </div>
    </div>
  </div>
</div>

<!-- ═══ 在庫管理ページ ═══ -->
<div id="page-inventory" class="page active">
  <div class="inv-wrap">
    <div class="inv-header">
      <div>
        <div class="inv-eyebrow">🧵 手持ちの刺繍糸管理</div>
      </div>
      <div class="inv-stats">
        <div class="inv-stat"><strong id="stat-total">0</strong><span>本</span></div>
        <div class="inv-stat inv-stat-warn" id="stat-low-box" style="display:none">
          <strong id="stat-low">0</strong><span>残り少ない</span>
        </div>
      </div>
    </div>
    <div class="inv-toolbar">
      <label class="inv-search">🔍<input id="inv-query" placeholder="色番号・色名・プロジェクトで検索"></label>
      <select class="inv-select" id="inv-brand-filter"><option value="すべて">すべてのブランド</option></select>
      <select class="inv-select" id="inv-sort">
        <option value="brand">ブランド・番号順</option>
        <option value="low">残量が少ない順</option>
        <option value="recent">追加が新しい順</option>
      </select>
      <button class="inv-btn inv-btn-solid" id="inv-add-btn">＋ 糸を追加</button>
    </div>
    <div id="inv-list-wrap"></div>
  </div>
</div>

<!-- 追加/編集モーダル -->
<div class="inv-overlay" id="inv-modal" style="display:none">
  <div class="inv-sheet">
    <div class="inv-sheet-head">
      <h2 id="modal-title">糸を追加</h2>
      <button class="inv-icon-btn" id="modal-close">✕</button>
    </div>
    <div class="inv-sheet-body">
      <div class="inv-preview-row">
        <div class="inv-preview-swatch" id="modal-swatch" style="background:#B5483D"></div>
        <div class="inv-preview-text">
          <span class="mono" id="modal-preview-num">—</span>
          <span class="muted" id="modal-preview-name">色名未設定</span>
        </div>
      </div>
      <div class="inv-field-row">
        <label class="inv-field">
          <span>ブランド</span>
          <select id="modal-brand">
            <option>DMC</option><option>コスモ</option><option>オリムパス</option><option>アンカー</option><option>その他</option>
          </select>
        </label>
        <label class="inv-field" id="custom-brand-field" style="display:none">
          <span>ブランド名</span>
          <input id="modal-custom-brand" placeholder="例: ハマナカ">
        </label>
      </div>
      <div class="inv-field-row">
        <label class="inv-field">
          <span>色番号 <span id="match-tag" class="match-tag" style="display:none"></span></span>
          <input id="modal-num" placeholder="例: 310" style="font-family:monospace">
        </label>
        <label class="inv-field">
          <span>色名</span>
          <input id="modal-name" placeholder="例: ブラック">
        </label>
      </div>
      <p class="inv-hint" id="dmc-hint" style="display:none">DMCの番号を入力すると、色見本が自動で設定されます。</p>
      <label class="inv-field">
        <span>色見本</span>
        <div class="inv-color-pick-row">
          <input type="color" id="modal-color-picker" value="#B5483D">
          <input type="text" id="modal-hex" value="#B5483D" style="font-family:monospace">
        </div>
      </label>
      <div class="inv-field-row">
        <label class="inv-field">
          <span>未開封の本数</span>
          <input type="number" id="modal-skeins" min="0" value="1">
        </label>
        <label class="inv-field">
          <span>使用中の残量 <span id="modal-remaining-label">100</span>%</span>
          <input type="range" id="modal-remaining" min="0" max="100" step="5" value="100">
        </label>
      </div>
      <label class="inv-field">
        <span>使用予定・プロジェクト</span>
        <input id="modal-project" placeholder="例: クロスステッチの花柄">
      </label>
      <label class="inv-field">
        <span>メモ</span>
        <textarea id="modal-notes" rows="2" placeholder="任意"></textarea>
      </label>
    </div>
    <div class="inv-sheet-foot">
      <button class="inv-btn inv-btn-ghost" id="modal-cancel">キャンセル</button>
      <button class="inv-btn inv-btn-solid" id="modal-save">保存する</button>
    </div>
  </div>
</div>

<!-- 削除確認 -->
<div class="inv-overlay" id="confirm-modal" style="display:none">
  <div class="inv-confirm">
    <p>この糸の記録を削除しますか？</p>
    <div class="inv-confirm-actions">
      <button class="inv-btn inv-btn-ghost" id="confirm-cancel">キャンセル</button>
      <button class="inv-btn inv-btn-danger" id="confirm-ok">削除する</button>
    </div>
  </div>
</div>
<div class="inv-save-indicator" id="save-indicator" style="display:none">保存中…</div>

<canvas id="off-canvas" style="display:none"></canvas>

// ══════════════════════════════════════════════
//  色処理ユーティリティ
// ══════════════════════════════════════════════
function rgbToLab(r,g,b){
  let R=r/255,G=g/255,B=b/255;
  R=R>0.04045?Math.pow((R+0.055)/1.055,2.4):R/12.92;
  G=G>0.04045?Math.pow((G+0.055)/1.055,2.4):G/12.92;
  B=B>0.04045?Math.pow((B+0.055)/1.055,2.4):B/12.92;
  let X=(R*0.4124+G*0.3576+B*0.1805)/0.95047;
  let Y=(R*0.2126+G*0.7152+B*0.0722)/1.00000;
  let Z=(R*0.0193+G*0.1192+B*0.9505)/1.08883;
  const f=v=>v>0.008856?Math.pow(v,1/3):7.787*v+16/116;
  return[116*f(Y)-16,500*(f(X)-f(Y)),200*(f(Y)-f(Z))];
}
function deltaE(a,b){return Math.sqrt((a[0]-b[0])**2+(a[1]-b[1])**2+(a[2]-b[2])**2);}
function hexToRgb(hex){const n=parseInt(hex.replace('#',''),16);return[(n>>16)&255,(n>>8)&255,n&255];}
function toHex(r,g,b){return'#'+[r,g,b].map(v=>v.toString(16).padStart(2,'0')).join('');}
function findBest(r,g,b,db){
  const lab=rgbToLab(r,g,b);let best=db[0],bd=Infinity;
  for(const d of db){const[dr,dg,db2]=hexToRgb(d.h);const delta=deltaE(lab,rgbToLab(dr,dg,db2));if(delta<bd){bd=delta;best=d;}}
  return{thread:best,delta:bd};
}
function kMeansWithCount(pixels,k,iters=15){
  let centers=[];const used=new Set();
  while(centers.length<k){const i=Math.floor(Math.random()*pixels.length);if(!used.has(i)){used.add(i);centers.push([...pixels[i]]);}}
  let assign=new Array(pixels.length).fill(0);
  for(let it=0;it<iters;it++){
    const cl=Array.from({length:k},()=>[]);
    for(let pi=0;pi<pixels.length;pi++){const px=pixels[pi];let best=0,bd=Infinity;for(let i=0;i<k;i++){const d=(px[0]-centers[i][0])**2+(px[1]-centers[i][1])**2+(px[2]-centers[i][2])**2;if(d<bd){bd=d;best=i;}}cl[best].push(px);assign[pi]=best;}
    centers=cl.map((c,i)=>c.length?[Math.round(c.reduce((s,p)=>s+p[0],0)/c.length),Math.round(c.reduce((s,p)=>s+p[1],0)/c.length),Math.round(c.reduce((s,p)=>s+p[2],0)/c.length)]:centers[i]);
  }
  const counts=new Array(k).fill(0);for(const a of assign)counts[a]++;
  return centers.map((c,i)=>({rgb:c,count:counts[i],pct:counts[i]/pixels.length*100}));
}

}

const viewport=document.getElementById('viewport');
const viewCanvas=document.getElementById('view-canvas');
const vCtx=viewCanvas.getContext('2d');
const selOverlay=document.getElementById('sel-overlay');
const dimRect=document.getElementById('dim-rect');
const maskHole=document.getElementById('mask-hole');
const selRect=document.getElementById('sel-rect');
const dragRect=document.getElementById('drag-rect');
let img=null,zoom=1,offsetX=0,offsetY=0,selection=null,mode='pan';
let panStart=null,panOffset0=null,selDragStart=null,pinchDist0=null,pinchZoom0=null;

function clampOffset(){
  const vpW=viewport.clientWidth,vpH=viewport.clientHeight;
  const iW=img.width*zoom,iH=img.height*zoom;
  if(iW<=vpW)offsetX=(vpW-iW)/2;else offsetX=Math.min(0,Math.max(vpW-iW,offsetX));
  if(iH<=vpH)offsetY=(vpH-iH)/2;else offsetY=Math.min(0,Math.max(vpH-iH,offsetY));
}
function applyZoom(nz,px,py){
  nz=Math.max(0.1,Math.min(20,nz));
  const r=nz/zoom;offsetX=px-(px-offsetX)*r;offsetY=py-(py-offsetY)*r;zoom=nz;clampOffset();render();
}
function fitImage(){
  if(!img)return;
  const vpW=viewport.clientWidth,vpH=viewport.clientHeight;
  zoom=Math.min(vpW/img.width,vpH/img.height,1);
  offsetX=(vpW-img.width*zoom)/2;offsetY=(vpH-img.height*zoom)/2;render();
}
function render(){
  if(!img)return;
  const vpW=viewport.clientWidth,vpH=viewport.clientHeight;
  viewCanvas.width=vpW;viewCanvas.height=vpH;
  selOverlay.setAttribute('width',vpW);selOverlay.setAttribute('height',vpH);
  document.getElementById('mask-bg').setAttribute('width',vpW);
  document.getElementById('mask-bg').setAttribute('height',vpH);
  vCtx.clearRect(0,0,vpW,vpH);vCtx.imageSmoothingEnabled=zoom<2;
  vCtx.drawImage(img,offsetX,offsetY,img.width*zoom,img.height*zoom);
  document.getElementById('zoom-label').textContent=Math.round(zoom*100)+'%';
  if(selection){
    const sx=selection.x*zoom+offsetX,sy=selection.y*zoom+offsetY,sw=selection.w*zoom,sh=selection.h*zoom;
    maskHole.setAttribute('x',sx);maskHole.setAttribute('y',sy);maskHole.setAttribute('width',sw);maskHole.setAttribute('height',sh);
    dimRect.setAttribute('visibility','visible');
    selRect.setAttribute('x',sx);selRect.setAttribute('y',sy);selRect.setAttribute('width',sw);selRect.setAttribute('height',sh);selRect.setAttribute('visibility','visible');
  }else{dimRect.setAttribute('visibility','hidden');selRect.setAttribute('visibility','hidden');}
}
function vpToImg(vx,vy){return{x:(vx-offsetX)/zoom,y:(vy-offsetY)/zoom};}
function evPos(e,idx=0){const r=viewport.getBoundingClientRect();const s=e.touches?e.touches[idx]:e;return{x:s.clientX-r.left,y:s.clientY-r.top};}

viewport.addEventListener('wheel',e=>{e.preventDefault();const p=evPos(e);applyZoom(zoom*(e.deltaY>0?0.85:1/0.85),p.x,p.y);},{passive:false});
viewport.addEventListener('mousedown',e=>{e.preventDefault();const p=evPos(e);if(mode==='pan'){panStart=p;panOffset0={x:offsetX,y:offsetY};}else{const ip=vpToImg(p.x,p.y);selDragStart={vx:p.x,vy:p.y,ix:ip.x,iy:ip.y};}});
window.addEventListener('mousemove',e=>{
  if(mode==='pan'&&panStart){const p=evPos(e);offsetX=panOffset0.x+(p.x-panStart.x);offsetY=panOffset0.y+(p.y-panStart.y);clampOffset();render();}
  else if(mode==='sel'&&selDragStart){const p=evPos(e);dragRect.setAttribute('x',Math.min(selDragStart.vx,p.x));dragRect.setAttribute('y',Math.min(selDragStart.vy,p.y));dragRect.setAttribute('width',Math.abs(p.x-selDragStart.vx));dragRect.setAttribute('height',Math.abs(p.y-selDragStart.vy));dragRect.setAttribute('visibility','visible');}
});
window.addEventListener('mouseup',e=>{
  if(mode==='pan'&&panStart){panStart=null;}
  else if(mode==='sel'&&selDragStart){
    const p=evPos(e);const ip=vpToImg(p.x,p.y);
    const ix=Math.min(selDragStart.ix,ip.x),iy=Math.min(selDragStart.iy,ip.y);
    const iw=Math.abs(ip.x-selDragStart.ix),ih=Math.abs(ip.y-selDragStart.iy);
    dragRect.setAttribute('visibility','hidden');selDragStart=null;
    if(iw<2||ih<2)return;
    selection={x:Math.max(0,ix),y:Math.max(0,iy),w:Math.min(iw,img.width-Math.max(0,ix)),h:Math.min(ih,img.height-Math.max(0,iy))};
    document.getElementById('btn-clear-sel').style.display='inline-block';updateHint();render();
  }
});
viewport.addEventListener('touchstart',e=>{
  e.preventDefault();
  if(e.touches.length===2){panStart=null;selDragStart=null;pinchDist0=Math.hypot(evPos(e,0).x-evPos(e,1).x,evPos(e,0).y-evPos(e,1).y);pinchZoom0=zoom;}
  else{const p=evPos(e);pinchDist0=null;if(mode==='pan'){panStart=p;panOffset0={x:offsetX,y:offsetY};}else{const ip=vpToImg(p.x,p.y);selDragStart={vx:p.x,vy:p.y,ix:ip.x,iy:ip.y};}}
},{passive:false});
viewport.addEventListener('touchmove',e=>{
  e.preventDefault();
  if(e.touches.length===2&&pinchDist0!==null){
    const d=Math.hypot(evPos(e,0).x-evPos(e,1).x,evPos(e,0).y-evPos(e,1).y);
    const cx=(evPos(e,0).x+evPos(e,1).x)/2,cy=(evPos(e,0).y+evPos(e,1).y)/2;
    applyZoom(pinchZoom0*(d/pinchDist0),cx,cy);
  }else if(e.touches.length===1){
    const p=evPos(e);
    if(mode==='pan'&&panStart){offsetX=panOffset0.x+(p.x-panStart.x);offsetY=panOffset0.y+(p.y-panStart.y);clampOffset();render();}
    else if(mode==='sel'&&selDragStart){dragRect.setAttribute('x',Math.min(selDragStart.vx,p.x));dragRect.setAttribute('y',Math.min(selDragStart.vy,p.y));dragRect.setAttribute('width',Math.abs(p.x-selDragStart.vx));dragRect.setAttribute('height',Math.abs(p.y-selDragStart.vy));dragRect.setAttribute('visibility','visible');}
  }
},{passive:false});
viewport.addEventListener('touchend',e=>{
  e.preventDefault();if(pinchDist0!==null){pinchDist0=null;return;}
  if(mode==='sel'&&selDragStart){
    const t=e.changedTouches[0];const r=viewport.getBoundingClientRect();
    const vp={x:t.clientX-r.left,y:t.clientY-r.top};const ip=vpToImg(vp.x,vp.y);
    const ix=Math.min(selDragStart.ix,ip.x),iy=Math.min(selDragStart.iy,ip.y);
    const iw=Math.abs(ip.x-selDragStart.ix),ih=Math.abs(ip.y-selDragStart.iy);
    dragRect.setAttribute('visibility','hidden');selDragStart=null;
    if(iw<2||ih<2)return;
    selection={x:Math.max(0,ix),y:Math.max(0,iy),w:Math.min(iw,img.width-Math.max(0,ix)),h:Math.min(ih,img.height-Math.max(0,iy))};
    document.getElementById('btn-clear-sel').style.display='inline-block';updateHint();render();
  }
  panStart=null;
},{passive:false});

const offCanvas=document.getElementById('off-canvas');
const offCtx=offCanvas.getContext('2d');

function buildMatchCard(rank,extractedRgb,thread,delta,pct,isBest,brand){
  const hex=toHex(...extractedRgb);
  const bc=delta<10?'delta-great':delta<20?'delta-good':'delta-fair';
  const bt=delta<10?'高精度':delta<20?'良好':'近似';
  const barH=Math.min(Math.round(pct),100);
  const crown=isBest?'<span class="crown-badge" title="このメーカーが最も近い色">👑</span>':'';
  const inStock=hasStock(brand,thread.n);
  const check=inStock?'<span class="check-badge" title="在庫あり">✅</span>':'';
  const stockClass=inStock?' in-stock':'';
  return `<div class="color-row${isBest?' best-brand':''}${stockClass}">
    <div class="row-rank">${rank}</div>
    <div class="row-swatches">
      <div class="swatch-h" style="background:${hex}"><span class="swatch-label">抽出</span></div>
      <div class="swatch-h" style="background:${thread.h}"><span class="swatch-label">糸</span></div>
    </div>
    <div class="row-info">
      <div class="thread-num">${thread.n} ${crown}${check}</div>
      <div class="thread-name">${thread.name}</div>
      <div class="hex-pair"><span>${hex.toUpperCase()}</span><span>→</span><span>${thread.h.toUpperCase()}</span></div>
      <span class="delta-badge ${bc}">${bt} ΔE ${delta.toFixed(1)}</span>
    </div>
    <div class="row-bar">
      <div class="bar-track"><div class="bar-fill" style="height:${barH}%"></div></div>
      <div class="bar-pct">${pct.toFixed(1)}%</div>
    </div>
  </div>`;
}

document.getElementById('btn-extract').addEventListener('click',()=>{
  if(!img)return;
  document.getElementById('btn-extract').disabled=true;
  document.getElementById('loading').style.display='block';
  document.getElementById('results-section').style.display='none';
  setTimeout(()=>{
    const k=5;
    let sx=0,sy=0,sw=img.width,sh=img.height;
    if(selection){sx=Math.max(0,Math.round(selection.x));sy=Math.max(0,Math.round(selection.y));sw=Math.min(Math.round(selection.w),img.width-sx);sh=Math.min(Math.round(selection.h),img.height-sy);}
    const scale=Math.min(300/sw,300/sh,1);
    offCanvas.width=Math.max(1,Math.round(sw*scale));offCanvas.height=Math.max(1,Math.round(sh*scale));
    offCtx.drawImage(img,sx,sy,sw,sh,0,0,offCanvas.width,offCanvas.height);
    const data=offCtx.getImageData(0,0,offCanvas.width,offCanvas.height).data;
    const pixels=[];for(let i=0;i<data.length;i+=4){if(data[i+3]<128)continue;pixels.push([data[i],data[i+1],data[i+2]]);}
    const sampled=pixels.length>3000?Array.from({length:3000},()=>pixels[Math.floor(Math.random()*pixels.length)]):pixels;
    const sorted=[...kMeansWithCount(sampled,k)].sort((a,b)=>b.count-a.count);
    const brandKeys=Object.keys(MATCH_BRANDS);
    const allMatches=sorted.map(item=>{
      const m={};for(const[brand,db]of Object.entries(MATCH_BRANDS))m[brand]=findBest(...item.rgb,db);
      const bestBrand=brandKeys.reduce((a,b)=>m[a].delta<=m[b].delta?a:b);
      return{item,m,bestBrand};
    });
    const crownCount={dmc:0,cosmo:0,olympus:0};
    for(const{bestBrand}of allMatches)crownCount[bestBrand]++;
    document.querySelectorAll('.brand-tab').forEach(tab=>{
      const b=tab.dataset.brand;
      const labels={dmc:'DMC',cosmo:'COSMO',olympus:'オリムパス'};
      tab.textContent=labels[b];
      if(crownCount[b]>0){const c=document.createElement('span');c.textContent=' 👑';c.title=`${crownCount[b]}色でベストマッチ`;tab.appendChild(c);}
    });
    for(const brand of brandKeys){
      const list=document.getElementById('list-'+brand);list.innerHTML='';
      allMatches.forEach(({item,m,bestBrand},i)=>{const{thread,delta}=m[brand];list.innerHTML+=buildMatchCard(i+1,item.rgb,thread,delta,item.pct,bestBrand===brand,brand);});
    }
    document.getElementById('loading').style.display='none';
    document.getElementById('results-section').style.display='block';
    document.getElementById('btn-extract').disabled=false;
  },50);
});

let inventory = [];
let editingId = null;
let confirmDeleteId = null;

function saveInventory() {
  localStorage.setItem('emb-inventory', JSON.stringify(inventory));
}
function loadInventory() {
  try { inventory = JSON.parse(localStorage.getItem('emb-inventory') || '[]'); } catch { inventory = []; }
}
loadInventory();
function isLow(t) { return t.skeinCount === 0 && t.remaining <= 25; }
function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2, 8); }

// ── 在庫一覧レンダリング ──
function renderInventory() {
  const query = document.getElementById('inv-query').value.trim().toLowerCase();
  const brandFilter = document.getElementById('inv-brand-filter').value;
  const sortKey = document.getElementById('inv-sort').value;
  const brands = [...new Set(inventory.map(t => t.brand))].sort();
  const sel = document.getElementById('inv-brand-filter');
  const cur = sel.value;
  sel.innerHTML = '<option value="すべて">すべてのブランド</option>';
  brands.forEach(b => { const o = document.createElement('option'); o.value = b; o.textContent = b; sel.appendChild(o); });
  if (brands.includes(cur)) sel.value = cur;
  let list = inventory.filter(t => {
    if (brandFilter !== 'すべて' && t.brand !== brandFilter) return false;
    if (!query) return true;
    return [t.colorNumber, t.colorName, t.brand, t.project || '', t.notes || ''].some(s => s.toLowerCase().includes(query));
  });
  if (sortKey === 'brand') list = [...list].sort((a, b) => a.brand.localeCompare(b.brand) || a.colorNumber.localeCompare(b.colorNumber, 'ja', { numeric: true }));
  else if (sortKey === 'low') list = [...list].sort((a, b) => { const av = a.skeinCount > 0 ? 1000 + a.remaining : a.remaining; const bv = b.skeinCount > 0 ? 1000 + b.remaining : b.remaining; return av - bv; });
  else if (sortKey === 'recent') list = [...list].sort((a, b) => b.createdAt - a.createdAt);
  const total = inventory.length;
  const low = inventory.filter(isLow).length;
  document.getElementById('stat-total').textContent = total;
  document.getElementById('stat-low').textContent = low;
  document.getElementById('stat-low-box').style.display = low > 0 ? 'flex' : 'none';
  const wrap = document.getElementById('inv-list-wrap');
  if (list.length === 0) {
    wrap.innerHTML = `<div class="inv-empty">${total === 0 ? '<div style="font-size:2rem">🧵</div><h3>まだ糸が登録されていません</h3><p>お手持ちの刺繍糸を登録して管理しましょう。</p><button class="inv-btn inv-btn-solid" onclick="openModal()">＋ 最初の糸を追加する</button>' : '<h3>該当する糸が見つかりません</h3><p>検索条件を変えてみてください。</p>'}</div>`;
    return;
  }
  wrap.innerHTML = `<div class="inv-grid">${list.map(t => {
    const low = isLow(t);
    return `<div class="inv-card">
      <div class="inv-card-swatch" style="background:${t.hex}"></div>
      <div class="inv-card-info">
        <div class="inv-card-top"><span class="inv-brand-tag">${t.brand}</span><span class="inv-code">${t.colorNumber}</span></div>
        ${t.colorName ? `<div class="inv-color-name">${t.colorName}</div>` : ''}
        <div class="inv-qty-row">
          <span class="inv-pill ${t.skeinCount > 0 ? '' : 'inv-pill-low'}">${t.skeinCount > 0 ? `未開封 ${t.skeinCount}本` : '未開封なし'}</span>
          <span class="inv-pill">使用中 ${t.remaining}%</span>
          ${low ? '<span class="inv-pill inv-pill-low">⚠️ 残り少ない</span>' : ''}
        </div>
        ${t.project ? `<div class="inv-project">📌 ${t.project}</div>` : ''}
        ${t.notes ? `<div class="inv-notes">${t.notes}</div>` : ''}
      </div>
      <div class="inv-card-actions">
        <button class="inv-icon-btn" onclick="openModal('${t.id}')" title="編集">✏️</button>
        <button class="inv-icon-btn danger" onclick="openConfirmDelete('${t.id}')" title="削除">🗑️</button>
      </div>
    </div>`;
  }).join('')}</div>`;
}

// ── モーダル ──
function openModal(id) {
  editingId = id || null;
  const t = id ? inventory.find(x => x.id === id) : null;
  document.getElementById('modal-title').textContent = t ? '糸を編集' : '糸を追加';
  document.getElementById('modal-brand').value = t?.brand || 'DMC';
  document.getElementById('modal-num').value = t?.colorNumber || '';
  document.getElementById('modal-name').value = t?.colorName || '';
  document.getElementById('modal-hex').value = t?.hex || '#B5483D';
  document.getElementById('modal-color-picker').value = t?.hex || '#B5483D';
  document.getElementById('modal-skeins').value = t?.skeinCount ?? 1;
  document.getElementById('modal-remaining').value = t?.remaining ?? 100;
  document.getElementById('modal-remaining-label').textContent = t?.remaining ?? 100;
  document.getElementById('modal-project').value = t?.project || '';
  document.getElementById('modal-notes').value = t?.notes || '';
  updateModalPreview();
  handleBrandChange();
  document.getElementById('inv-modal').style.display = 'flex';
  setTimeout(() => document.getElementById('modal-num').focus(), 50);
}
function closeModal() { document.getElementById('inv-modal').style.display = 'none'; editingId = null; }
function updateModalPreview() {
  const brand = document.getElementById('modal-brand').value;
  const num = document.getElementById('modal-num').value || '—';
  const name = document.getElementById('modal-name').value || '色名未設定';
  const hex = document.getElementById('modal-hex').value;
  document.getElementById('modal-preview-num').textContent = `${brand} ${num}`;
  document.getElementById('modal-preview-name').textContent = name;
  document.getElementById('modal-swatch').style.background = hex;
}
function handleBrandChange() {
  const brand = document.getElementById('modal-brand').value;
  document.getElementById('custom-brand-field').style.display = brand === 'その他' ? 'flex' : 'none';
  document.getElementById('dmc-hint').style.display = brand === 'DMC' ? 'block' : 'none';
}
document.getElementById('modal-brand').addEventListener('change', () => { handleBrandChange(); checkDmcAuto(); updateModalPreview(); });
document.getElementById('modal-num').addEventListener('input', () => { checkDmcAuto(); updateModalPreview(); });
document.getElementById('modal-name').addEventListener('input', updateModalPreview);
document.getElementById('modal-hex').addEventListener('input', e => { document.getElementById('modal-color-picker').value = e.target.value; updateModalPreview(); });
document.getElementById('modal-color-picker').addEventListener('input', e => { document.getElementById('modal-hex').value = e.target.value; updateModalPreview(); });
document.getElementById('modal-remaining').addEventListener('input', e => { document.getElementById('modal-remaining-label').textContent = e.target.value; });
document.getElementById('modal-close').addEventListener('click', closeModal);
document.getElementById('modal-cancel').addEventListener('click', closeModal);
document.getElementById('inv-modal').addEventListener('click', e => { if (e.target === e.currentTarget) closeModal(); });

function checkDmcAuto() {
  const brand = document.getElementById('modal-brand').value;
  const tag = document.getElementById('match-tag');
  if (brand !== 'DMC') { tag.style.display = 'none'; return; }
  const num = document.getElementById('modal-num').value.trim().toUpperCase();
  if (!num) { tag.style.display = 'none'; return; }
  const match = DMC_OFFICIAL[num];
  if (match) {
    document.getElementById('modal-hex').value = match[0];
    document.getElementById('modal-color-picker').value = match[0];
    document.getElementById('modal-name').value = match[1];
    tag.textContent = '✓ 公式カラーを自動設定'; tag.className = 'match-tag match-ok'; tag.style.display = 'inline';
    updateModalPreview();
  } else {
    tag.textContent = 'この番号は見つかりません'; tag.className = 'match-tag match-warn'; tag.style.display = 'inline';
  }
}

document.getElementById('modal-save').addEventListener('click', () => {
  const num = document.getElementById('modal-num').value.trim();
  if (!num) return;
  let brand = document.getElementById('modal-brand').value;
  if (brand === 'その他') { const cb = document.getElementById('modal-custom-brand').value.trim(); if (cb) brand = cb; }
  const t = {
    id: editingId || uid(),
    brand,
    colorNumber: num,
    colorName: document.getElementById('modal-name').value.trim(),
    hex: document.getElementById('modal-hex').value,
    skeinCount: Math.max(0, Number(document.getElementById('modal-skeins').value) || 0),
    remaining: Math.max(0, Math.min(100, Number(document.getElementById('modal-remaining').value))),
    project: document.getElementById('modal-project').value.trim(),
    notes: document.getElementById('modal-notes').value.trim(),
    createdAt: editingId ? (inventory.find(x => x.id === editingId)?.createdAt || Date.now()) : Date.now(),
  };
  if (editingId) { inventory = inventory.map(x => x.id === editingId ? t : x); }
  else { inventory = [t, ...inventory]; }
  saveInventory(); closeModal(); renderInventory();
  const si = document.getElementById('save-indicator'); si.style.display = 'block'; setTimeout(() => si.style.display = 'none', 1200);
});

function openConfirmDelete(id) { confirmDeleteId = id; document.getElementById('confirm-modal').style.display = 'flex'; }
document.getElementById('confirm-cancel').addEventListener('click', () => { document.getElementById('confirm-modal').style.display = 'none'; confirmDeleteId = null; });
document.getElementById('confirm-ok').addEventListener('click', () => { if (confirmDeleteId) { inventory = inventory.filter(x => x.id !== confirmDeleteId); saveInventory(); renderInventory(); } document.getElementById('confirm-modal').style.display = 'none'; confirmDeleteId = null; });
document.getElementById('confirm-modal').addEventListener('click', e => { if (e.target === e.currentTarget) { document.getElementById('confirm-modal').style.display = 'none'; confirmDeleteId = null; } });

document.getElementById('inv-add-btn').addEventListener('click', () => openModal());
document.getElementById('inv-query').addEventListener('input', renderInventory);
document.getElementById('inv-brand-filter').addEventListener('change', renderInventory);
document.getElementById('inv-sort').addEventListener('change', renderInventory);

// 初期表示
renderInventory();
</script>
</body>
